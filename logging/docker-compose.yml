version: '3'

services:
  filebeat:
    image: docker.elastic.co/beats/filebeat:7.17.9
    container_name: filebeat
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml
      - /var/log:/var/log
    depends_on:
      - logstash

  python-app:
    image: python:3.9
    container_name: log-generator
    volumes:
      - /var/log:/var/log
      - ./app.py:/app/app.py
    command: python /app/app.py